version: "3.9"

services:
  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8080"
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
